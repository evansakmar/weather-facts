<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/weather-facts/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c6c6c6" />
    <meta name="color-scheme" content="light dark" />

    <title>Weather Facts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/weather-facts/assets/main-CHAHnF9h.js"></script>
    <link rel="stylesheet" crossorigin href="/weather-facts/assets/main-XLhVwK-z.css">
  <link rel="manifest" href="/weather-facts/manifest.webmanifest"></head>

  <body>
    <div x-data="settings" class="app">
      <h1 class="title">Weather Facts</h1>
      <h2>Settings</h2>

      <div class="settings">
        <label for="latitude-input">Latitude:</label>
        <input
          id="latitude-input"
          type="number"
          step="0.000001"
          x-model="latitude"
        />

        <label for="longitude-input">Longitude:</label>
        <input
          id="longitude-input"
          type="number"
          step="0.000001"
          x-model="longitude"
        />

        <button class="settings-action" @click="getLocation()">
          Get My Location
        </button>


        <button class="settings-action" @click="saveSettings()">
          Save Settings
        </button>
      </div>
    </div>

  </body>
</html>
