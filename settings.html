<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c6c6c6" />
    <meta name="color-scheme" content="light dark" />

    <title>Weather Facts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div x-data="settings" class="app">
      <h1 class="title">Weather Facts</h1>
      <h2>Settings</h2>

      <div class="settings">
        <label>Latitude:</label>
        <input type="number" step="0.000001" x-model="latitude" />

        <label>Longitude:</label>
        <input type="number" step="0.000001" x-model="longitude" />

        <label for="amCommuteTime">AM Commute Time:</label>
        <select id="amCommuteTime" x-model="amCommuteTime">
          <template x-for="hour in 24" :key="hour">
            <option :value="hour - 1" x-text="hour - 1"></option>
          </template>
        </select>

        <label for="pmCommuteTime">PM Commute Time:</label>
        <select id="pmCommuteTime" x-model="pmCommuteTime">
          <template x-for="hour in 24" :key="hour">
            <option :value="hour - 1" x-text="hour - 1"></option>
          </template>
        </select>

        <button class="settings-action" @click="getLocation()">
          Get My Location
        </button>

        <button class="settings-action" @click="saveSettings()">
          Save Settings
        </button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
