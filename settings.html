<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/weather-facts/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c6c6c6" />
    <meta name="color-scheme" content="light dark" />

    <title>Weather Facts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/weather-facts/assets/main-CHAHnF9h.js"></script>
    <link rel="stylesheet" crossorigin href="/weather-facts/assets/main-XLhVwK-z.css">
  <link rel="manifest" href="/weather-facts/manifest.webmanifest"></head>

  <body>
    <div x-data="settings" class="app">
      <h1 class="title">Weather Facts</h1>
      <h2>Settings</h2>

      <div class="settings">
        <label for="latitude-input">Latitude:</label>
        <input
          id="latitude-input"
          type="number"
          step="0.000001"
          x-model="latitude"
        />

        <label for="longitude-input">Longitude:</label>
        <input
          id="longitude-input"
          type="number"
          step="0.000001"
          x-model="longitude"
        />

        <button class="settings-action" @click="getLocation()">
          Get My Location
        </button>

        <h2 class="section-header_sub">Commute Times</h2>

        <label for="amCommuteTime">AM Commute Time:</label>
        <select id="amCommuteTime" x-model="amCommuteTime">
          <option value="1">1:00am</option>
          <option value="2">2:00am</option>
          <option value="3">3:00am</option>
          <option value="4">4:00am</option>
          <option value="5">5:00am</option>
          <option value="6">6:00am</option>
          <option value="7">7:00am</option>
          <option value="8">8:00am</option>
          <option value="9">9:00am</option>
          <option value="10">10:00am</option>
          <option value="11">11:00am</option>
          <option value="12">12:00pm</option>
        </select>

        <label for="pmCommuteTime">PM Commute Time:</label>
        <select id="pmCommuteTime" x-model="pmCommuteTime">
          <option value="13">1:00pm</option>
          <option value="14">2:00pm</option>
          <option value="15">3:00pm</option>
          <option value="16">4:00pm</option>
          <option value="17">5:00pm</option>
          <option value="18">6:00pm</option>
          <option value="19">7:00pm</option>
          <option value="20">8:00pm</option>
          <option value="21">9:00pm</option>
          <option value="22">10:00pm</option>
          <option value="23">11:00pm</option>
        </select>

        <button class="settings-action" @click="saveSettings()">
          Save Settings
        </button>
      </div>
    </div>

  </body>
</html>
